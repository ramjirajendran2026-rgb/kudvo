name: Run Bun Command and Commit Generated Assets

on:
  push:
    branches:
      - main

permissions:
  contents: write # Grants the workflow write permissions for the repository

jobs:
  run-and-commit-assets:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - name: Check out the code
        uses: actions/checkout@v4

      # Step 2: Set up PHP
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      # Step 3: Install Composer Dependencies
      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts

      # Step 4: Install Bun
      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo 'export PATH="$HOME/.bun/bin:$PATH"' >> $GITHUB_ENV
          export PATH="$HOME/.bun/bin:$PATH"

      # Step 5: Install Node.js Dependencies
      - name: Install Node.js Dependencies
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun install

      # Step 6: Build Assets
      - name: Run Assets Build
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          bun run build

      # Step 7: Add and Commit Generated Assets
      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add generated assets after build [skip ci]" || echo "No changes to commit"
          git push
