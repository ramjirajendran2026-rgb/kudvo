name: Run Bun Command and Commit Generated Assets

on:
  push:
    branches:
      - main

jobs:
  run-and-commit-assets:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code
      - name: Check out the code
        uses: actions/checkout@v4

      # Step 2: Install Bun
      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH

      # Step 3: Verify Bun installation (optional)
      - name: Verify Bun installation
        run: bun --version

      # Step 4: Run Bun commands
      - name: Run Bun Commands
        run: |
          bun install
          bun run build

      # Step 5: Add and commit generated assets
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add generated assets after build [skip ci]" || echo "No changes to commit"
          git push
